<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXYUN — Kabar Terkini</title>
<style>
  :root{
    --ink:#1c1b1a;
    --paper:#f6f3ee;
    --line:#d8d2c6;
    --accent:#8a5a3b;
    --accent-soft:#e7d9c9;
    --muted:#7a756c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Iowan Old Style','Georgia',serif;
    line-height:1.55;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 20px;}
  header{padding:56px 0 28px;border-bottom:2px solid var(--ink);}
  .eyebrow{
    font-family:'Helvetica Neue',Arial,sans-serif;
    text-transform:uppercase;letter-spacing:.14em;font-size:12px;
    color:var(--accent);margin:0 0 10px;
  }
  h1{font-size:clamp(30px,6vw,46px);margin:0 0 8px;font-weight:700;}
  .meta{
    font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;color:var(--muted);
  }
  .tagline{
    font-family:'Helvetica Neue',Arial,sans-serif;font-size:15px;color:var(--muted);
    margin:0 0 4px;
  }
  nav{
    display:flex;flex-wrap:wrap;gap:8px;
    padding:20px 0;border-bottom:1px solid var(--line);
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  nav button{
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:6px 14px;border-radius:999px;font-size:13px;cursor:pointer;
  }
  nav button.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  section.category{padding:32px 0;border-bottom:1px solid var(--line);}
  section.category h2{
    font-family:'Helvetica Neue',Arial,sans-serif;
    text-transform:uppercase;letter-spacing:.1em;font-size:13px;
    color:var(--accent);margin:0 0 18px;
  }
  article{padding:16px 0;border-top:1px solid var(--line);}
  article:first-child{border-top:none;}
  article h3{margin:0 0 6px;font-size:19px;line-height:1.3;}
  article h3 a{color:var(--ink);text-decoration:none;}
  article h3 a:hover{color:var(--accent);}
  article p{
    margin:0 0 6px;font-size:15px;color:#4a4744;
  }
  article .src{
    font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;color:var(--muted);
  }
  .empty{
    font-family:'Helvetica Neue',Arial,sans-serif;color:var(--muted);
    padding:20px;border:1px dashed var(--line);border-radius:10px;
  }
  footer{padding:36px 0 72px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;color:var(--muted);}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">ahmadalhabsyi.is-a.dev</p>
      <h1>NEXYUN</h1>
      <p class="tagline">Kabar terkini, diperbarui otomatis</p>
      <p class="meta" id="updated">Memuat berita…</p>
    </header>

    <nav id="tabs"></nav>

    <main id="content"></main>

    <footer>
      Berita diambil otomatis dari sumber RSS publik dan diperbarui tiap jam. Klik judul untuk membaca artikel lengkap di situs sumber aslinya.
    </footer>
  </div>

<script>
const CATEGORY_LABELS = {
  nasional: "Nasional",
  ekonomi: "Ekonomi",
  olahraga: "Olahraga",
  teknologi: "Teknologi",
  hiburan: "Hiburan",
  dunia: "Dunia",
};

let newsData = null;
let activeCategory = null;

async function loadNews() {
  try {
    const res = await fetch("data/news.json?_=" + Date.now());
    newsData = await res.json();
    render();
  } catch (e) {
    document.getElementById("content").innerHTML =
      '<p class="empty">Belum ada data berita. Jalankan workflow "Update Berita" di GitHub Actions untuk mengisi data pertama kali.</p>';
  }
}

function render() {
  const updatedEl = document.getElementById("updated");
  const date = new Date(newsData.updatedAt);
  updatedEl.textContent = "Terakhir diperbarui: " + date.toLocaleString("id-ID");

  const cats = Object.keys(newsData.categories);
  if (!activeCategory) activeCategory = cats[0];

  const tabs = document.getElementById("tabs");
  tabs.innerHTML = cats.map(c =>
    `<button data-cat="${c}" class="${c === activeCategory ? 'active' : ''}">${CATEGORY_LABELS[c] || c}</button>`
  ).join("");
  tabs.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => { activeCategory = btn.dataset.cat; render(); };
  });

  const content = document.getElementById("content");
  const items = newsData.categories[activeCategory] || [];
  if (items.length === 0) {
    content.innerHTML = '<p class="empty">Belum ada berita di kategori ini.</p>';
    return;
  }
  content.innerHTML = `
    <section class="category">
      <h2>${CATEGORY_LABELS[activeCategory] || activeCategory}</h2>
      ${items.map(item => `
        <article>
          <h3><a href="${item.link}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a></h3>
          <p>${escapeHtml(item.summary || "")}</p>
          <div class="src">${escapeHtml(item.source || "")}</div>
        </article>
      `).join("")}
    </section>
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

loadNews();
// Cek data baru tiap 5 menit tanpa perlu reload manual
setInterval(loadNews, 5 * 60 * 1000);
</script>
</body>
</html>
